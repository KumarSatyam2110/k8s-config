apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend

spec:
  replicas: 3

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: KumarSatyam2110/frontend:v1.0.5

        ports:
        - containerPort: 3000
